<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="What makes it different — Privacy is the model, Governance at the edge, Nothing is invisible.">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1230"/><stop offset="0.5" stop-color="#120C24"/><stop offset="1" stop-color="#0C0819"/>
    </linearGradient>
    <linearGradient id="pbrand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/><stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="pdiv" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#6D46C0" stop-opacity="0"/><stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.6"/><stop offset="1" stop-color="#6D46C0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="phalo" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#A855F7" stop-opacity="0.22"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="pdots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#A855F7" opacity="0.06"/>
    </pattern>
    <filter id="pglow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="docclip"><rect x="-20" y="-24" width="40" height="48" rx="4"/></clipPath>
  </defs>

  <rect width="1280" height="300" rx="24" fill="url(#pbg)"/>
  <rect width="1280" height="300" rx="24" fill="url(#pdots)"/>
  <ellipse cx="640" cy="140" rx="560" ry="150" fill="url(#phalo)"/>

  <!-- dividers -->
  <rect x="444" y="56" width="2" height="188" fill="url(#pdiv)"/>
  <rect x="844" y="56" width="2" height="188" fill="url(#pdiv)"/>

  <!-- ===================== PILLAR 1 · PRIVACY (center 230) ===================== -->
  <g transform="translate(230 0)">
    <g transform="translate(0 96)">
      <circle r="30" fill="#A855F7" opacity="0.12"><animate attributeName="opacity" values="0.06;0.2;0.06" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle r="30" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.4"><animate attributeName="r" values="24;34" dur="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0" dur="2.8s" repeatCount="indefinite"/></circle>
      <path d="M0 -20 L16 -13 V2 C16 13 9 18 0 22 C-9 18 -16 13 -16 2 V-13 Z" fill="url(#pbrand)" stroke="#F4F2FB" stroke-width="1.2" filter="url(#pglow)"/>
      <path d="M-6 1 L-1.5 5.5 L7 -6" fill="none" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="0" y="176" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="17" font-weight="800" letter-spacing="0.2" fill="#EDE9FA">Privacy is the model</text>
    <rect x="-20" y="188" width="40" height="3" rx="1.5" fill="url(#pbrand)"/>
    <g font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12.5" fill="#B3A8D6" text-anchor="middle">
      <text x="0" y="214">PII/SPII, consent &amp; propagation are</text>
      <text x="0" y="233"><tspan font-weight="700" fill="#D4CCEC">first-class</tspan> — never a bolt-on.</text>
      <text x="0" y="252">If it isn't allowed, it doesn't move.</text>
    </g>
  </g>

  <!-- ===================== PILLAR 2 · GOVERNANCE (center 640) ===================== -->
  <g transform="translate(640 0)">
    <g transform="translate(0 96)">
      <circle r="30" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
      <!-- funnel -->
      <path d="M-16 -12 H16 L5 4 V15 L-5 15 V4 Z" fill="#1A1230" stroke="url(#pbrand)" stroke-width="2" stroke-linejoin="round"/>
      <!-- dots dropping through funnel -->
      <circle cx="-6" r="2.6" fill="#22D3EE"><animate attributeName="cy" values="-22;12" dur="1.6s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.8;1" dur="1.6s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="7" r="2.6" fill="#A855F7"><animate attributeName="cy" values="-22;12" dur="1.6s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.8;1" dur="1.6s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="0" r="2.6" fill="#22D3EE"><animate attributeName="cy" values="-22;12" dur="1.6s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.8;1" dur="1.6s" begin="1s" repeatCount="indefinite"/></circle>
      <!-- one blocked dot bouncing off -->
      <circle r="2.8" fill="#F43F5E"><animate attributeName="cx" values="12;20" dur="1.6s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="cy" values="-18;-6" dur="1.6s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="1.6s" begin="0.8s" repeatCount="indefinite"/></circle>
    </g>
    <text x="0" y="176" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="17" font-weight="800" letter-spacing="0.2" fill="#EDE9FA">Governance at the edge</text>
    <rect x="-20" y="188" width="40" height="3" rx="1.5" fill="url(#pbrand)"/>
    <g font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12.5" fill="#B3A8D6" text-anchor="middle">
      <text x="0" y="214">Policies attach to the</text>
      <text x="0" y="233"><tspan font-weight="700" fill="#D4CCEC">source itself</tspan>. There is no</text>
      <text x="0" y="252">downstream without a policy.</text>
    </g>
  </g>

  <!-- ===================== PILLAR 3 · AUDIT (center 1050) ===================== -->
  <g transform="translate(1050 0)">
    <g transform="translate(0 96)">
      <circle r="30" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
      <!-- document -->
      <g clip-path="url(#docclip)">
        <rect x="-14" y="-18" width="28" height="36" rx="4" fill="#1A1230" stroke="url(#pbrand)" stroke-width="2"/>
        <!-- scan line -->
        <rect x="-14" y="-18" width="28" height="6" fill="#22D3EE" opacity="0.35"><animate attributeName="y" values="-18;12;-18" dur="2.6s" repeatCount="indefinite"/></rect>
      </g>
      <!-- entry lines + checks appearing -->
      <g stroke="#C4B5FD" stroke-width="1.6" stroke-linecap="round">
        <line x1="-8" y1="-10" x2="6" y2="-10"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.2;1" dur="2.6s" repeatCount="indefinite"/></line>
        <line x1="-8" y1="-2" x2="4" y2="-2"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.3;0.5;1" dur="2.6s" repeatCount="indefinite"/></line>
        <line x1="-8" y1="6" x2="6" y2="6"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.55;0.75;1" dur="2.6s" repeatCount="indefinite"/></line>
      </g>
      <path d="M-3 -10 L-1 -8 L3 -12" fill="none" stroke="#34D399" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" transform="translate(6 0)"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.25;1" dur="2.6s" repeatCount="indefinite"/></path>
    </g>
    <text x="0" y="176" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="17" font-weight="800" letter-spacing="0.2" fill="#EDE9FA">Nothing is invisible</text>
    <rect x="-20" y="188" width="40" height="3" rx="1.5" fill="url(#pbrand)"/>
    <g font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12.5" fill="#B3A8D6" text-anchor="middle">
      <text x="0" y="214">Every change is</text>
      <text x="0" y="233"><tspan font-weight="700" fill="#D4CCEC">version-tracked &amp; audited</tspan>.</text>
      <text x="0" y="252">Full history, full accountability.</text>
    </g>
  </g>
</svg>
