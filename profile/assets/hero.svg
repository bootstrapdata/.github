<svg width="1280" height="468" viewBox="0 0 1280 468" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bootstrap Data — the control plane for customer data you can trust.">
  <defs>
    <linearGradient id="bg_hp" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1230"/><stop offset="0.5" stop-color="#120C24"/><stop offset="1" stop-color="#0C0819"/>
    </linearGradient>
    <linearGradient id="brand_hp" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/><stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="rule_hp" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo_hp" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#A855F7" stop-opacity="0.30"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots_hp" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#A855F7" opacity="0.05"/>
    </pattern>
    <filter id="glow_hp" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="468" rx="28" fill="url(#bg_hp)"/>
  <rect width="1280" height="468" rx="28" fill="url(#dots_hp)"/>
  <ellipse cx="640" cy="150" rx="620" ry="230" fill="url(#halo_hp)"/>
  <g fill="#A855F7" opacity="0.34"><circle cx="120" cy="70" r="1.6"><animate attributeName="opacity" values="0.1;0.55;0.1" dur="4s" repeatCount="indefinite"/></circle><circle cx="1180" cy="90" r="2.1"><animate attributeName="opacity" values="0.1;0.55;0.1" dur="5s" repeatCount="indefinite"/></circle><circle cx="260" cy="120" r="2.6"><animate attributeName="opacity" values="0.1;0.55;0.1" dur="6s" repeatCount="indefinite"/></circle><circle cx="1040" cy="60" r="1.6"><animate attributeName="opacity" values="0.1;0.55;0.1" dur="7s" repeatCount="indefinite"/></circle><circle cx="70" cy="200" r="2.1"><animate attributeName="opacity" values="0.1;0.55;0.1" dur="8s" repeatCount="indefinite"/></circle><circle cx="1210" cy="210" r="2.6"><animate attributeName="opacity" values="0.1;0.55;0.1" dur="9s" repeatCount="indefinite"/></circle></g>
  <circle cx="640" cy="86" r="52" fill="none" stroke="#A855F7" stroke-opacity="0.25" stroke-width="1.5">
    <animate attributeName="r" values="46;60;46" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.35;0;0.35" dur="5s" repeatCount="indefinite"/></circle>
  <g transform="translate(610.6 56.599999999999994) scale(1.05)">
    <rect width="56" height="56" rx="15" fill="url(#brand_hp)" filter="url(#glow_hp)"/>
    <g fill="#FFFFFF" transform="translate(-4 -4)">
      <ellipse cx="32" cy="20" rx="13" ry="5"/>
      <path opacity="0.78" d="M19 20v8.5c0 2.76 5.82 5 13 5s13-2.24 13-5V20c0 2.76-5.82 5-13 5s-13-2.24-13-5Z"/>
      <path opacity="0.56" d="M19 32v8.5c0 2.76 5.82 5 13 5s13-2.24 13-5V32c0 2.76-5.82 5-13 5s-13-2.24-13-5Z"/>
    </g></g>
  <text x="640" y="176" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5" fill="#F2EEFC">Bootstrap<tspan fill="url(#brand_hp)" dx="4">Data</tspan></text>
  <text x="640" y="224" text-anchor="middle" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="15" font-weight="600" letter-spacing="5" fill="#A855F7">DATA&#160;&#160;CONTROL&#160;&#160;PLANE</text>
  <text x="640" y="286" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.2" fill="#F2EEFC">The control plane for customer data</text>
  <text x="640" y="338" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.2" fill="#F2EEFC">you can <tspan fill="url(#brand_hp)">trust.</tspan></text>
  <text x="640" y="382" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="500" letter-spacing="0.2" fill="#C6BCE6">Define what data should be allowed to become — before it moves downstream.</text>
  <g>
    <rect x="441" y="410" width="118" height="34" rx="17" fill="#171029" stroke="#34D399" stroke-opacity="0.5"/>
    <circle cx="461" cy="427" r="4.5" fill="#34D399"/>
    <text x="477" y="432" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="13" font-weight="600" letter-spacing="1.5" fill="#F2EEFC">ALLOW</text>
  </g>
  <g>
    <rect x="581" y="410" width="118" height="34" rx="17" fill="#171029" stroke="#FB7185" stroke-opacity="0.5"/>
    <circle cx="601" cy="427" r="4.5" fill="#FB7185"/>
    <text x="617" y="432" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="13" font-weight="600" letter-spacing="1.5" fill="#F2EEFC">BLOCK</text>
  </g>
  <g>
    <rect x="721" y="410" width="118" height="34" rx="17" fill="#171029" stroke="#FBBF24" stroke-opacity="0.5"/>
    <circle cx="741" cy="427" r="4.5" fill="#FBBF24"/>
    <text x="757" y="432" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="13" font-weight="600" letter-spacing="1.5" fill="#F2EEFC">OMIT</text>
  </g>
</svg>
