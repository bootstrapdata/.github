<svg width="1280" height="132" viewBox="0 0 1280 132" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="THE PROBLEM — The problem every data team knows.">
  <defs>
    <linearGradient id="bg_h" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1230"/><stop offset="0.5" stop-color="#120C24"/><stop offset="1" stop-color="#0C0819"/>
    </linearGradient>
    <linearGradient id="brand_h" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/><stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="rule_h" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo_h" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#A855F7" stop-opacity="0.30"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots_h" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#A855F7" opacity="0.05"/>
    </pattern>
    <filter id="glow_h" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="132" rx="28" fill="url(#bg_h)"/>
  <rect width="1280" height="132" rx="28" fill="url(#dots_h)"/>
  <ellipse cx="136" cy="20" rx="360" ry="120" fill="url(#halo_h)"/>
  <g transform="translate(96 40)" filter="url(#glow_h)">
    <rect x="0"  y="6"  width="5" height="16" rx="2.5" fill="url(#brand_h)"/>
    <rect x="8"  y="0"  width="5" height="22" rx="2.5" fill="url(#brand_h)"/>
    <rect x="16" y="10" width="5" height="12" rx="2.5" fill="#22D3EE"/>
  </g>
  <text x="140" y="58" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="14" letter-spacing="3.5" font-weight="600" fill="#A855F7">01&#160;&#160;·&#160;&#160;THE PROBLEM</text>
  <text x="140" y="100" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5" fill="#F2EEFC"><tspan fill="#F2EEFC">The problem every </tspan><tspan fill="url(#brand_h)">data team</tspan><tspan fill="#F2EEFC"> knows.</tspan></text>
  <rect x="96" y="118" width="1088" height="1.5" rx="0.75" fill="url(#rule_h)"/>
</svg>
