<svg width="1280" height="28" viewBox="0 0 1280 28" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="dline" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A855F7" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="dglow" x="-50%" y="-400%" width="200%" height="900%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="80" y1="14" x2="1200" y2="14" stroke="url(#dline)" stroke-width="1.5"/>
  <circle cx="640" cy="14" r="3.5" fill="#C4B5FD"/>
  <circle cx="628" cy="14" r="2.2" fill="#7C3AED" opacity="0.7"/>
  <circle cx="652" cy="14" r="2.2" fill="#22D3EE" opacity="0.7"/>
  <!-- traveling glow -->
  <circle r="4" fill="#E9D5FF" filter="url(#dglow)">
    <animateMotion dur="4.5s" repeatCount="indefinite" path="M120 14 L1160 14"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</svg>
