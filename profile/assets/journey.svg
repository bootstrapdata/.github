<svg width="1280" height="430" viewBox="0 0 1280 430" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The data journey — Ingest, Govern, Store, Activate.">
  <defs>
    <linearGradient id="jbg" x1="0" y1="0" x2="1280" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1230"/><stop offset="0.5" stop-color="#120C24"/><stop offset="1" stop-color="#0C0819"/>
    </linearGradient>
    <linearGradient id="jbrand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/><stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="jhalo" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#A855F7" stop-opacity="0.28"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="jdots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#A855F7" opacity="0.06"/>
    </pattern>
    <filter id="jglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="430" rx="24" fill="url(#jbg)"/>
  <rect width="1280" height="430" rx="24" fill="url(#jdots)"/>
  <ellipse cx="640" cy="200" rx="560" ry="200" fill="url(#jhalo)"/>

  <!-- ===== connectors (behind panels) ===== -->
  <g stroke="#6D46C0" stroke-width="2" opacity="0.55">
    <line x1="290" y1="200" x2="356" y2="200"/>
    <line x1="606" y1="200" x2="672" y2="200"/>
    <line x1="922" y1="200" x2="988" y2="200"/>
  </g>
  <!-- arrowheads -->
  <g fill="#8B5CF6">
    <path d="M356 200 l-9 -5 v10 z"/><path d="M672 200 l-9 -5 v10 z"/><path d="M988 200 l-9 -5 v10 z"/>
  </g>
  <!-- flowing dots along connectors -->
  <g filter="url(#jglow)">
    <circle r="4" fill="#22D3EE"><animateMotion dur="2.2s" begin="0s"   repeatCount="indefinite" path="M290 200 L352 200"/></circle>
    <circle r="4" fill="#A855F7"><animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite" path="M290 200 L352 200"/></circle>
    <circle r="4" fill="#A855F7"><animateMotion dur="2.2s" begin="0.5s" repeatCount="indefinite" path="M606 200 L668 200"/></circle>
    <circle r="4" fill="#22D3EE"><animateMotion dur="2.2s" begin="1.6s" repeatCount="indefinite" path="M606 200 L668 200"/></circle>
    <circle r="4" fill="#8B5CF6"><animateMotion dur="2.2s" begin="0.3s" repeatCount="indefinite" path="M922 200 L984 200"/></circle>
    <circle r="4" fill="#22D3EE"><animateMotion dur="2.2s" begin="1.4s" repeatCount="indefinite" path="M922 200 L984 200"/></circle>
  </g>
  <!-- a PII dot blocked before Govern -->
  <circle r="4.5" fill="#22D3EE" filter="url(#jglow)">
    <animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite" keyPoints="0;0.7;0.7" keyTimes="0;0.7;1" calcMode="linear" path="M290 200 L352 200"/>
    <animate attributeName="fill" values="#22D3EE;#F43F5E;#F43F5E" keyTimes="0;0.7;1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.7;0.85;1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ===================== PANEL: INGEST (center 165) ===================== -->
  <g>
    <rect x="40" y="70" width="250" height="290" rx="18" fill="#16102A" stroke="#7C3AED" stroke-opacity="0.32" stroke-width="1.5"/>
    <text x="165" y="112" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800" letter-spacing="2.5" fill="#EDE9FA">① &#160;INGEST</text>
    <rect x="145" y="124" width="40" height="3" rx="1.5" fill="url(#jbrand)"/>
    <text x="165" y="146" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1.4" fill="#8B82A8">FIRST-PARTY SOURCES</text>
    <!-- icon: broadcast -->
    <g transform="translate(165 190)">
      <circle r="24" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.5"><animate attributeName="r" values="14;26" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle r="18" fill="#1A1230" stroke="url(#jbrand)" stroke-width="2.5"/>
      <circle r="6" fill="url(#jbrand)"><animate attributeName="r" values="6;8;6" dur="2.2s" repeatCount="indefinite"/></circle>
    </g>
    <!-- channel chips -->
    <g font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#C9C0E6" text-anchor="middle">
      <g><rect x="70" y="240" width="86" height="24" rx="12" fill="#221838" stroke="#6D46C0" stroke-opacity="0.4"/><text x="113" y="256">Android</text></g>
      <g><rect x="164" y="240" width="56" height="24" rx="12" fill="#221838" stroke="#6D46C0" stroke-opacity="0.4"/><text x="192" y="256">iOS</text></g>
      <g><rect x="70" y="272" width="70" height="24" rx="12" fill="#221838" stroke="#6D46C0" stroke-opacity="0.4"/><text x="105" y="288">JS</text></g>
      <g><rect x="148" y="272" width="72" height="24" rx="12" fill="#221838" stroke="#6D46C0" stroke-opacity="0.4"/><text x="184" y="288">Unity</text></g>
      <g><rect x="102" y="304" width="86" height="24" rx="12" fill="#221838" stroke="#6D46C0" stroke-opacity="0.4"/><text x="145" y="320">Direct API</text></g>
    </g>
  </g>

  <!-- ===================== PANEL: GOVERN (center 481) ===================== -->
  <g>
    <rect x="356" y="70" width="250" height="290" rx="18" fill="#181031" stroke="#A855F7" stroke-opacity="0.5" stroke-width="1.75"/>
    <text x="481" y="112" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800" letter-spacing="2.5" fill="#EDE9FA">② &#160;GOVERN</text>
    <rect x="461" y="124" width="40" height="3" rx="1.5" fill="url(#jbrand)"/>
    <text x="481" y="146" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1.4" fill="#8B82A8">POLICY · CONSENT</text>
    <!-- shield icon with allow/block badges -->
    <g transform="translate(481 190)">
      <circle r="26" fill="#A855F7" opacity="0.14"><animate attributeName="opacity" values="0.08;0.2;0.08" dur="2.4s" repeatCount="indefinite"/></circle>
      <path d="M0 -20 L16 -13 V2 C16 13 9 18 0 22 C-9 18 -16 13 -16 2 V-13 Z" fill="url(#jbrand)" stroke="#F4F2FB" stroke-width="1.2"/>
      <path d="M-6 1 L-1.5 5.5 L7 -6" fill="none" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- allow badge -->
      <g transform="translate(24 -14)"><circle r="9" fill="#10281C" stroke="#34D399" stroke-width="1.5"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.8s" repeatCount="indefinite"/></circle><path d="M-3.5 0 L-1 2.5 L4 -3" fill="none" stroke="#34D399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.8s" repeatCount="indefinite"/></path></g>
      <!-- block badge -->
      <g transform="translate(-24 -14)"><circle r="9" fill="#2A1420" stroke="#F43F5E" stroke-width="1.5"><animate attributeName="opacity" values="1;0.35;1" dur="2.8s" repeatCount="indefinite"/></circle><path d="M-3 -3 L3 3 M3 -3 L-3 3" stroke="#F43F5E" stroke-width="1.8" stroke-linecap="round"><animate attributeName="opacity" values="1;0.35;1" dur="2.8s" repeatCount="indefinite"/></path></g>
    </g>
    <!-- rows -->
    <g font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#D4CCEC" text-anchor="middle">
      <text x="481" y="252">Propagation Policy</text>
      <text x="481" y="284" font-size="11.5" fill="#B3A8D6">Matchers · PII / SPII</text>
      <text x="481" y="314" font-size="11.5" fill="#B3A8D6">Consent Categories</text>
    </g>
  </g>

  <!-- ===================== PANEL: STORE (center 797) ===================== -->
  <g>
    <rect x="672" y="70" width="250" height="290" rx="18" fill="#16102A" stroke="#7C3AED" stroke-opacity="0.32" stroke-width="1.5"/>
    <text x="797" y="112" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800" letter-spacing="2.5" fill="#EDE9FA">③ &#160;STORE</text>
    <rect x="777" y="124" width="40" height="3" rx="1.5" fill="url(#jbrand)"/>
    <text x="797" y="146" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1.4" fill="#8B82A8">LAKES · WAREHOUSES</text>
    <!-- database icon -->
    <g transform="translate(797 190)">
      <circle r="24" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.4"/>
      <circle r="18" fill="#1A1230" stroke="url(#jbrand)" stroke-width="2.5"/>
      <g stroke="#C4B5FD" stroke-width="1.8" fill="none" transform="scale(1.15)">
        <ellipse cx="0" cy="-5" rx="8" ry="3"/>
        <path d="M-8 -5 V5 C-8 6.7 -4 8 0 8 C4 8 8 6.7 8 5 V-5"/>
        <path d="M-8 0 C-8 1.7 -4 3 0 3 C4 3 8 1.7 8 0"/>
      </g>
    </g>
    <g font-family="Segoe UI, Inter, system-ui, sans-serif" text-anchor="middle">
      <text x="797" y="248" font-size="12.5" font-weight="600" fill="#D4CCEC">Data Lakes</text>
      <text x="797" y="270" font-size="11" fill="#8B82A8" letter-spacing="0.5">JSON · PARQUET</text>
      <text x="797" y="304" font-size="12.5" font-weight="600" fill="#D4CCEC">Warehouses</text>
      <text x="797" y="326" font-size="11" fill="#8B82A8" letter-spacing="0.5">DATABRICKS</text>
    </g>
  </g>

  <!-- ===================== PANEL: ACTIVATE (center 1113) ===================== -->
  <g>
    <rect x="988" y="70" width="250" height="290" rx="18" fill="#16102A" stroke="#7C3AED" stroke-opacity="0.32" stroke-width="1.5"/>
    <text x="1113" y="112" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="15" font-weight="800" letter-spacing="2.5" fill="#EDE9FA">④ &#160;ACTIVATE</text>
    <rect x="1093" y="124" width="40" height="3" rx="1.5" fill="url(#jbrand)"/>
    <text x="1113" y="146" text-anchor="middle" font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1.4" fill="#8B82A8">DESTINATIONS</text>
    <!-- lightning icon -->
    <g transform="translate(1113 190)">
      <circle r="24" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.45"><animate attributeName="r" values="18;26" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle r="18" fill="#1A1230" stroke="url(#jbrand)" stroke-width="2.5"/>
      <path d="M-3 -11 L-9 2 H-1 L-4 11 L9 -3 H0 L3 -11 Z" fill="url(#jbrand)" stroke="#FFFFFF" stroke-width="0.8" stroke-linejoin="round"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite"/></path>
    </g>
    <g font-family="Segoe UI, Inter, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#C9C0E6" text-anchor="middle">
      <g><rect x="1028" y="240" width="80" height="26" rx="13" fill="#221838" stroke="#6D46C0" stroke-opacity="0.4"/><text x="1068" y="257">Braze</text></g>
      <g><rect x="1118" y="240" width="92" height="26" rx="13" fill="#221838" stroke="#6D46C0" stroke-opacity="0.4"/><text x="1164" y="257">Mixpanel</text></g>
      <text x="1113" y="308" font-size="11.5" fill="#B3A8D6">reshaped via field</text>
      <text x="1113" y="326" font-size="11.5" font-weight="700" fill="#C4B5FD">Mappings</text>
    </g>
  </g>
</svg>
